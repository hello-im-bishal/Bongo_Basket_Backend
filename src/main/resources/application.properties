spring.application.name=Bongo_Basket-App-1

server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL}


spring.datasource.username=${SPRING_DATASOURCE_USERNAME}


spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


#spring.jpa.hibernate.ddl-auto=update
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
jwt.secret=your-very-long-secure-secret-key-for-production-12345678901234567890
jwt.expiration=3600000
spring.jpa.hibernate.ddl-auto=validate

# Enable CORS for specific endpoints
spring.web.cors.allowed-origin-patterns=http://127.0.0.1:5500
spring.web.cors.exposed-headers=*
spring.web.cors.max-age=36000
spring.web.cors.allowed-origins=http://127.0.0.1:5500
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO

